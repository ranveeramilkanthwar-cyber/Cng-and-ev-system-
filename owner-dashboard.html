<div class="p-6 bg-white rounded-xl shadow-md">
    <h2 class="text-xl font-bold mb-4">Register Your Station</h2>
    <input type="text" id="stName" placeholder="Station Name" class="border p-2 w-full mb-2">
    <select id="stType" class="border p-2 w-full mb-2">
        <option value="EV">EV Station</option>
        <option value="CNG">CNG Station</option>
    </select>
    <button onclick="getLocation()" class="bg-blue-500 text-white p-2 rounded">📍 Tag Current Location</button>
    <button id="saveStation" class="bg-teal-600 text-white p-2 rounded w-full mt-4">Submit for Approval</button>
</div>
